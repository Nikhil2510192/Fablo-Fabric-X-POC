name: Fabric-X POC CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Build and Validate ─────────────────────────
  build:
    name: Build and Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile check
        run: npx tsc --noEmit

      - name: Run generation pipeline
        run: npx ts-node src/generate.ts samples/fabric-x-simple.json

      - name: Verify generated files exist
        run: |
          ls -la fablo-target-fabricx/
          [ -f "fablo-target-fabricx/docker-compose.yml" ] || exit 1
          [ -f "fablo-target-fabricx/start.sh" ] || exit 1
          [ -f "fablo-target-fabricx/stop.sh" ] || exit 1
          echo "✅ All generated files present"

      - name: Validate docker-compose
        run: |
          cd fablo-target-fabricx
          docker compose config
          echo "✅ docker-compose.yml is valid"

  # ── Job 2: Docker Build and Scan ─────────────────────
  docker:
    name: Docker Build and Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fablo-fabric-x-poc:${{ github.sha }} .

      - name: Check image size
        run: |
          docker images fablo-fabric-x-poc:${{ github.sha }}
          echo "✅ Image built successfully"

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fablo-fabric-x-poc:${{ github.sha }}
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

  # ── Job 3: e2e Test ───────────────────────────────────
  e2e:
    name: e2e Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Make test script executable
        run: chmod +x scripts/test.sh

      - name: Run e2e test
        run: bash scripts/test.sh

      - name: Upload logs on failure
        if: failure()
        run: |
          cd fablo-target-fabricx
          docker compose logs > ../ci-logs.txt 2>&1 || true

      - name: Save logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: ci-logs.txt